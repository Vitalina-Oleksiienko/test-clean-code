<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link
    href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="style.css"
    media="screen"
    charset="utf-8"
  >
</head>
<body>
  <div class="header-block">
    <img
      class="header-block__img"
      src="./eisenhower-matrix.jpg" />
    <a
      class="header-block__link"
      href="https://goal-life.com/page/method/matrix-eisenhower"
    >Want more details?
    </a>
  </div>
  <div class="main-block">
    <p id="adding-element">
      <label for="new-task">Add Item</label>
      <div class="main-block__wrapper">
        <input
          id="new-task"
          class="main-block__input"
          type="text"
        />
        <button>Add</button>
      </div>
    </p>
    <h3>Todo</h3>
    <ul id="incomplete-tasks">
      <li>
        <input type="checkbox" />
        <label class="main-block__label">Pay Bills</label>
        <input
          type="text"
          class="main-block__input"
        />
        <button class="main-block__edit">Edit</button>
        <button class="main-block__delete">
          <img src="./remove.svg" />
        </button>
      </li>
      <li class="main-block__item">
        <input type="checkbox" />
        <label class="main-block__label">Go Shopping</label>
        <input
          type="text"
          value="Go Shopping"
          class="main-block__input"
        />
        <button class="main-block__edit">Save</button>
        <button class="main-block__delete">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
    <h3>Completed</h3>
    <ul id="completed-tasks">
      <li>
        <input
          type="checkbox"
          checked
        />
        <label class="main-block__label">See the Doctor</label>
        <input
          type="text"
          class="main-block__input"
        />
        <button class="main-block__edit">Edit</button>
        <button class="main-block__delete">
          <img src="./remove.svg" />
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
